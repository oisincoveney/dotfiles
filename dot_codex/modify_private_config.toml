chezmoi:modify-template
{{- $config := dict -}}
{{- if .chezmoi.stdin -}}
{{- $config = fromToml .chezmoi.stdin -}}
{{- end -}}
{{- $config = setValueAtPath "personality" "pragmatic" $config -}}
{{- $config = setValueAtPath "model" "gpt-5.5" $config -}}
{{- $config = setValueAtPath "model_reasoning_effort" "xhigh" $config -}}
{{- $config = setValueAtPath "plan_mode_reasoning_effort" "xhigh" $config -}}
{{- $config = setValueAtPath "developer_instructions" "Always start with a short message in the commentary channel before starting work." $config -}}
{{- $config = setValueAtPath "tui.status_line" (list "model-with-reasoning" "current-dir" "model" "git-branch" "pull-request-number" "five-hour-limit" "weekly-limit" "context-remaining" "context-used" "context-window-size") $config -}}
{{- $config = setValueAtPath "tui.status_line_use_colors" true $config -}}
{{- $config = setValueAtPath "notice.hide_rate_limit_model_nudge" true $config -}}
{{- $config = setValueAtPath "features.hooks" true $config -}}
{{- $config = setValueAtPath "features.apps" false $config -}}
{{- $config = setValueAtPath "features.memories" true $config -}}
{{- $config = setValueAtPath "features.prevent_idle_sleep" true $config -}}
{{- if env "BROKER_API_KEY" -}}
{{- $config = setValueAtPath "model_provider" "broker" $config -}}
{{- $config = setValueAtPath "model_providers.broker.name" "broker" $config -}}
{{- $config = setValueAtPath "model_providers.broker.base_url" "https://cliproxy.momokaya.ee/v1" $config -}}
{{- $config = setValueAtPath "model_providers.broker.env_key" "BROKER_API_KEY" $config -}}
{{- $config = setValueAtPath "model_providers.broker.wire_api" "responses" $config -}}
{{- else -}}
{{- $config = deleteValueAtPath "model_provider" $config -}}
{{- $config = deleteValueAtPath "model_providers.broker" $config -}}
{{- end -}}
{{- $config = setValueAtPath "mcp_servers.playwright.command" "mise" $config -}}
{{- $config = setValueAtPath "mcp_servers.playwright.args" (list "exec" "--" "playwright-mcp") $config -}}
{{- $config = setValueAtPath "mcp_servers.playwright.enabled" true $config -}}
{{- $config = setValueAtPath "mcp_servers.playwright.startup_timeout_sec" 20 $config -}}
{{- if env "REPO_DIR" -}}
{{- $config = setValueAtPath (list "projects" (env "REPO_DIR") "trust_level") "trusted" $config -}}
{{- end -}}
{{ $config | toToml }}
