"$schema" = 'https://starship.rs/config-schema.json'

# Full-width top bar: left cluster · $fill · right cluster on line 1; the input
# prompt sits on line 2. Repo-gated context (k8s/docker/gcloud) only shows where
# relevant. Optional right-cluster modules are fg-coloured so they never dangle a
# powerline separator.
format = """
[](surface0)\
$os\
$directory\
[](fg:surface0 bg:blue)\
$git_branch\
$git_state\
$git_commit\
$git_status\
[](fg:blue bg:teal)\
$nodejs$bun$rust$golang$python\
[](fg:teal)\
$package\
${custom.nub}\
$fill\
$git_metrics\
$kubernetes\
$docker_context\
${custom.gcloud}\
$terraform\
$direnv\
$cmd_duration\
$jobs\
$status\
$memory_usage\
$time\
$battery\
$line_break\
$username$hostname$localip$character"""

palette = 'catppuccin_mocha'
add_newline = true

[fill]
symbol = " "
style = "surface0"

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold peach)'

[username]
show_always = true
style_user = "bold lavender"
style_root = "bold red"
format = '[$user]($style)'

[hostname]
ssh_only = false
style = "bold overlay2"
format = '[@$hostname]($style) '

[localip]
disabled = false
ssh_only = true
format = '[$localipv4]($style) '
style = "overlay1"

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Macos = "󰀵 "
Linux = "󰌽 "
Ubuntu = "󰕈 "
Debian = "󰣚 "
Arch = "󰣇 "

[directory]
style = "fg:text bg:surface0"
format = "[ $path ]($style)"
truncation_length = 4
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "
"dev" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:blue fg:crust"
format = '[ $symbol $branch ]($style)'

[git_commit]
style = "bg:blue fg:crust"
format = '[\($hash$tag\) ]($style)'
only_detached = true

[git_state]
style = "bg:blue fg:crust"
format = '[\($state( $progress_current/$progress_total)\) ]($style)'

[git_status]
style = "bg:blue fg:crust"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "󰞇 "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = " ${count} "
modified = "✚${count} "
staged = "●${count} "
renamed = "»${count} "
deleted = "✘${count} "

# ── right cluster: context + status (fg-coloured, no bg chain) ────────
[git_metrics]
disabled = false
added_style = "green"
deleted_style = "red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

[kubernetes]
disabled = false
symbol = "☸ "
style = "sky"
format = '[$symbol$context( \($namespace\))]($style) '
detect_files = ['Chart.yaml', 'kustomization.yaml', 'skaffold.yaml', 'helmfile.yaml', 'Tiltfile']
detect_folders = ['k8s', '.helm', 'manifests', 'kubernetes', 'charts']

[docker_context]
symbol = " "
style = "sapphire"
format = '[$symbol$context]($style) '
detect_files = ['Dockerfile', 'docker-compose.yml', 'docker-compose.yaml', 'compose.yml', 'compose.yaml']
only_with_files = true

# custom gcloud: repo-gated, reads active project from the config file (no fork).
[custom.gcloud]
detect_files = ['app.yaml', 'cloudbuild.yaml', '.gcloudignore']
detect_folders = ['.gcloud']
command = "sed -n 's/^project *= *//p' ~/.config/gcloud/configurations/config_default 2>/dev/null | head -1"
symbol = "󱇶 "
style = "peach"
format = '[$symbol$output]($style) '
shell = ['bash', '--noprofile', '--norc']

# custom nub: show the pinned package-manager version in JS repos.
[custom.nub]
detect_files = ['package.json']
command = "nub --version 2>/dev/null | grep -oE '[0-9]+\\.[0-9]+\\.[0-9]+' | head -1"
symbol = "󰎙 "
style = "bg:teal fg:crust"
format = '[ $symbol $output ]($style)'
shell = ['bash', '--noprofile', '--norc']

[terraform]
symbol = "󱁢 "
style = "mauve"
format = '[$symbol$workspace]($style) '

[direnv]
disabled = false
style = "yellow"
symbol = "󱚟 "
format = '[$symbol$allowed]($style) '
allowed_msg = ""
not_allowed_msg = "✗"
denied_msg = "✗"

[package]
symbol = "󰏗 "
style = "overlay2"
format = '[$symbol$version]($style) '

[jobs]
symbol = "󰜎 "
style = "overlay1"
format = '[$symbol$number]($style) '

[status]
disabled = false
symbol = "✘ "
style = "red"
format = '[$symbol$status]($style) '

[memory_usage]
disabled = false
threshold = 0
symbol = "󰍛 "
style = "pink"
format = '[$symbol$ram_pct]($style) '

[time]
disabled = false
time_format = "%H:%M"
style = "overlay1"
format = '[ $time]($style) '

[battery]
format = '[$symbol$percentage]($style) '
[[battery.display]]
threshold = 20
style = "red"

[cmd_duration]
min_time = 250
style = "yellow"
format = '[󱫐 $duration]($style) '

[nodejs]
symbol = ""
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

[bun]
symbol = "🥟"
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = ""
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ""
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

# Catppuccin Mocha palette — https://github.com/catppuccin/starship
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
