"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](surface0)\
$os\
$directory\
[](fg:surface0 bg:blue)\
$git_branch\
$git_status\
[](fg:blue bg:teal)\
$nodejs$rust$golang$python$bun\
[](fg:teal bg:surface1)\
$cmd_duration\
[](fg:surface1)\
$line_break\
$character"""

palette = 'catppuccin_mocha'
add_newline = true

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold peach)'

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Macos = "󰀵 "
Linux = "󰌽 "
Ubuntu = "󰕈 "
Debian = "󰣚 "
Arch = "󰣇 "

[directory]
style = "fg:text bg:surface0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "
"dev" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:blue fg:crust"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:blue fg:crust"
format = '[$all_status$ahead_behind ]($style)'

[cmd_duration]
min_time = 500
style = "bg:surface1 fg:text"
format = "[ 󱫐 $duration ]($style)"

[nodejs]
symbol = ""
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

[bun]
symbol = "🥟"
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = ""
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ""
style = "bg:teal fg:crust"
format = '[ $symbol ($version) ]($style)'

# Catppuccin Mocha palette — https://github.com/catppuccin/starship
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
