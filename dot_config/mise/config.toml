# ── Agent-augmenting kit — tools an autonomous coding agent shells out to for
#    better work: structural edits, self-review diffs, secret/lint gates, repo→
#    context packing, k8s inspection, verify loops. Same portability rule:
#    aqua prebuilts win; npm/pipx/ubi only where no aqua binary exists.
#    All zero-config / inert-until-keyed — nothing here nags or needs upkeep.
# A · code-intel + edit-safety
ast-grep = "latest"                    # `sg`/`ast-grep` — AST search+rewrite, no regex hell
difftastic = "latest"                  # `difft` — syntax-aware diff (git dft); agent reviews own edits
semgrep = "latest"                     # taint/bug patterns text-search can't express (pipx)
gitleaks = "latest"                    # block secret commits
"cargo:git-absorb" = "latest"          # auto-fixup hunks into the right ancestor (no arm64-darwin prebuilt; compiles native)
"forgejo:mergiraf/mergiraf" = "latest" # AST-aware git merge driver — Codeberg prebuilt binary (forgejo backend, mac+Linux; cargo build needs nightly). Driver + attributes wired in ~/.gitconfig + ~/.config/git/attributes
shellcheck = "latest"                  # lint agent-written shell before CI
shfmt = "latest"                       # format agent-written shell
# B · agent context + data
"npm:repomix" = "latest" # pack a repo into one LLM-context file
"pipx:jc" = "latest"     # any CLI output (ps/dig/ls/…) → JSON for piping (aqua darwin-arm64 asset missing)
miller = "latest"        # `mlr` — awk/sed/cut for CSV/TSV/JSON
dasel = "latest"         # query/convert JSON/YAML/TOML/CSV/XML with one selector syntax
ripgrep-all = "latest"   # `rga` — ripgrep over PDF/docx/zip (poppler already present)
"pipx:llm" = "latest"    # simonw llm — scriptable one-shot LLM calls in pipes/hooks
# C · kubernetes / infra CLI kit (had GUI freelens only)
k9s = "latest"       # cluster TUI
stern = "latest"     # multi-pod multi-container log tail
kubectx = "latest"   # fast context switch (auto-uses fzf)
kubens = "latest"    # fast namespace switch
dive = "latest"      # OCI image-layer bloat inspector
trivy = "latest"     # CVE/secret/misconfig scanner (self-updating DB)
kubecolor = "latest" # colorized kubectl passthrough
# D · dev workflow / verify
just = "latest"                 # task runner; `just --dump` is agent-discoverable
watchexec = "latest"            # re-run a command on file change
hurl = "latest"                 # plain-text HTTP tests — agent verifies APIs
direnv = "latest"               # per-directory env (hook wired in tools.zsh)
sops = "latest"                 # encrypted secrets in git (age key; GitOps-native)
"aqua:d-kuro/gwq" = "latest"    # git-worktree manager — agents isolate parallel lanes in worktrees
# E · data & DB (agents had GUI-only db clients before)
duckdb = "latest"               # in-process analytical SQL; query CSV/JSON/Parquet files directly
usql = "latest"                 # universal DB CLI — one binary, any DB, scriptable queries
"github:dathere/qsv" = "latest" # fast CSV toolkit (stats/dedup/join/validate); complements miller
# F · verify & supply-chain (fits image build+push flow)
osv-scanner = "latest"                 # dep + container CVE scan vs OSV DB (Google); complements trivy
hadolint = "latest"                    # Dockerfile linter (lints RUN Bash too)
git-cliff = "latest"                   # changelog from Conventional Commits (feat|fix(scope): …)
bats = "latest"                        # bash test framework — agent tests the shell it writes
"github:lycheeverse/lychee" = "latest" # async link checker for md/html docs (aqua macOS asset misnamed)
# G · service/API & logs
oha = "latest"     # HTTP load generator; perf-check endpoints (complements hurl)
grpcurl = "latest" # `curl` for gRPC — exercise gRPC services from CLI
vale = "latest"    # prose/style linter for docs & markdown
# H · infra manifest validation & diff (argocd/helm/k3d/terraform CI gates)
kubeconform = "latest" # validate k8s manifests against schema
kube-linter = "latest" # lint k8s / Helm / Kustomize for misconfigs
conftest = "latest"    # OPA/Rego policy tests on any config
kustomize = "latest"   # render/patch k8s config (argocd renders this)
tflint = "latest"      # Terraform linter (provider-aware)
dyff = "latest"        # semantic YAML diff (manifest drift, not line noise)
jd = "latest"          # semantic JSON diff/patch (compare API responses/state)
# I · supply-chain hardening (GitOps + image push)
trufflehog = "latest" # secret scan that verifies creds are still LIVE (vs gitleaks detect-only)
syft = "latest"       # SBOM generator (feeds trivy/attestation)
cosign = "latest"     # Sigstore sign/verify artifacts & images
# J · multi-repo & release (~30 repos in ~/dev)
ghorg = "latest"                          # bulk-clone an entire org/user
mani = "latest"                           # run one command across many repos
"github:goreleaser/goreleaser" = "latest" # build+release binaries and images (github backend skips the nightly prereleases aqua interleaves)
k6 = "latest"                             # scriptable HTTP load testing
# K · config-format + agent extras
