[tools]
# node: mise owns the default `node` on PATH (brew's node stays only as a silent
# dependency of backlog-md/neonctl/oxfmt/etc). Projects still pin their own via
# .node-version / mise.toml; nub reads whatever PATH node matches the pin.
node = "lts"
uv = "latest"

# ── Global JS CLIs — single source of truth (was scattered across Homebrew's
#    node prefix + bun global). mise installs each and shims its bin on PATH.
# Dev toolkit / agents
"npm:@nubjs/nub" = "latest"
"npm:opencode-ai" = "latest"
"npm:@oisincoveney/pipeline" = "latest"   # moka
"npm:@mariozechner/pi-coding-agent" = "latest"  # pi
# yeet — Rust agent-spawn binary: drives claude/codex/opencode over native wire
# protocols (no SDKs), durable auto-resume of transient flakes. `yeet run|chat|
# resume|serve`. Source-built from git until a release pipeline lands (PIPE-104).
"github:oisin-ee/yeet" = "0.1.0"
"npm:agent-browser" = "latest"
"npm:eas-cli" = "latest"
# Codegen / scaffolding / lint
"npm:oxlint" = "latest"
"npm:fallow" = "latest"
"npm:context-awesome" = "latest"
"npm:@intellectronica/ruler" = "latest"
"npm:@melkeydev/go-blueprint" = "latest"
"npm:@devcontainers/cli" = "latest"
"npm:expo-doctor" = "latest"
"npm:ajv-cli" = "latest"
"npm:wscat" = "latest"
"npm:strip-json-comments-cli" = "latest"
# Zed ACP bridges
"npm:@zed-industries/claude-agent-acp" = "latest"
"npm:@zed-industries/claude-code-acp" = "latest"

# ── Portable CLI kit — installed identically on macOS + every Linux SSH box via
#    mise's aqua backend (prebuilt binaries, no compile, no Homebrew-on-Linux).
#    This is the cross-platform source of truth; brew = macOS GUI casks only.
# core replacements
eza = "latest"
bat = "latest"
fd = "latest"
ripgrep = "latest"
fzf = "latest"
zoxide = "latest"
starship = "latest"
atuin = "latest"
delta = "latest"
# zen TUIs
yazi = "latest"
lazygit = "latest"
lazydocker = "latest"
television = "latest"
# btop: no macOS prebuilt exists (aqua = linux-only). It's brew on mac +
# distro/aqua on Linux — the one unavoidable platform split. See run_once_01.
"github:Canop/broot" = "latest"
# modern-unix drop-ins
dust = "latest"
duf = "latest"
"aqua:dalance/procs" = "latest"
"aqua:d-kuro/gwq" = "latest"           # git-worktree manager (replaces wtp)
sd = "latest"
choose = "latest"
hyperfine = "latest"
tokei = "latest"
# charm + fetch (the sexy)
fastfetch = "latest"
"aqua:o2sh/onefetch" = "latest"
glow = "latest"
gum = "latest"
# data / http / net
xh = "latest"
jless = "latest"
"github:mr-karan/doggo" = "latest"
gping = "latest"
dasel = "latest"
# shell UX
carapace = "latest"
"cargo:tealdeer" = "latest"   # builds a binary named `tldr`
"cargo:navi" = "latest"
"cargo:pay-respects" = "latest"

# ── Agent-augmenting kit — tools an autonomous coding agent shells out to for
#    better work: structural edits, self-review diffs, secret/lint gates, repo→
#    context packing, k8s inspection, verify loops. Same portability rule as
#    above: aqua prebuilts win; npm/pipx/ubi only where no aqua binary exists.
#    All zero-config / inert-until-keyed — nothing here nags or needs upkeep.
# A · code-intel + edit-safety
ast-grep = "latest"          # `sg`/`ast-grep` — AST search+rewrite, no regex hell
difftastic = "latest"        # `difft` — syntax-aware diff (git dft); agent reviews own edits
semgrep = "latest"           # taint/bug patterns text-search can't express (pipx)
gitleaks = "latest"          # block secret commits
"cargo:git-absorb" = "latest"  # auto-fixup hunks into the right ancestor (no arm64-darwin prebuilt; compiles native)
"forgejo:mergiraf/mergiraf" = "latest"  # AST-aware git merge driver — Codeberg prebuilt binary (forgejo backend, mac+Linux; cargo build needs nightly). Driver + attributes wired in ~/.gitconfig + ~/.config/git/attributes
shellcheck = "latest"        # lint agent-written shell before CI
shfmt = "latest"             # format agent-written shell
# B · agent context + data
"npm:repomix" = "latest"     # pack a repo into one LLM-context file
"pipx:jc" = "latest"         # any CLI output (ps/dig/ls/…) → JSON for piping (aqua darwin-arm64 asset missing)
miller = "latest"            # `mlr` — awk/sed/cut for CSV/TSV/JSON
ripgrep-all = "latest"       # `rga` — ripgrep over PDF/docx/zip (poppler already present)
"pipx:llm" = "latest"        # simonw llm — scriptable one-shot LLM calls in pipes/hooks
# C · kubernetes / infra CLI kit (had GUI freelens only)
k9s = "latest"               # cluster TUI
stern = "latest"             # multi-pod multi-container log tail
kubectx = "latest"           # fast context switch (auto-uses fzf)
kubens = "latest"            # fast namespace switch
dive = "latest"              # OCI image-layer bloat inspector
trivy = "latest"             # CVE/secret/misconfig scanner (self-updating DB)
kubecolor = "latest"         # colorized kubectl passthrough
# D · dev workflow / verify
just = "latest"              # task runner; `just --dump` is agent-discoverable
watchexec = "latest"         # re-run a command on file change
hurl = "latest"              # plain-text HTTP tests — agent verifies APIs
mprocs = "latest"            # run parallel procs in split panes
direnv = "latest"            # per-directory env (hook wired in tools.zsh)
sops = "latest"              # encrypted secrets in git (age key; GitOps-native)
# E · data & DB (agents had GUI-only db clients before)
duckdb = "latest"            # in-process analytical SQL; query CSV/JSON/Parquet files directly
usql = "latest"              # universal DB CLI — one binary, any DB, scriptable queries
"github:dathere/qsv" = "latest"  # fast CSV toolkit (stats/dedup/join/validate); complements miller
# F · verify & supply-chain (fits image build+push flow)
osv-scanner = "latest"       # dep + container CVE scan vs OSV DB (Google); complements trivy
hadolint = "latest"          # Dockerfile linter (lints RUN Bash too)
git-cliff = "latest"         # changelog from Conventional Commits (feat|fix(scope): …)
bats = "latest"              # bash test framework — agent tests the shell it writes
"github:lycheeverse/lychee" = "latest"  # async link checker for md/html docs (aqua macOS asset misnamed)
# G · service/API & logs
oha = "latest"               # HTTP load generator; perf-check endpoints (complements hurl)
grpcurl = "latest"           # `curl` for gRPC — exercise gRPC services from CLI
"github:tstack/lnav" = "latest"  # log viewer with SQL queries over log files (aqua macOS asset misnamed)
vale = "latest"              # prose/style linter for docs & markdown
# H · infra manifest validation & diff (argocd/helm/k3d/terraform CI gates)
kubeconform = "latest"       # validate k8s manifests against schema
kube-linter = "latest"       # lint k8s / Helm / Kustomize for misconfigs
conftest = "latest"          # OPA/Rego policy tests on any config
kustomize = "latest"         # render/patch k8s config (argocd renders this)
tflint = "latest"            # Terraform linter (provider-aware)
dyff = "latest"              # semantic YAML diff (manifest drift, not line noise)
jd = "latest"                # semantic JSON diff/patch (compare API responses/state)
# I · supply-chain hardening (GitOps + image push)
trufflehog = "latest"        # secret scan that verifies creds are still LIVE (vs gitleaks detect-only)
syft = "latest"              # SBOM generator (feeds trivy/attestation)
cosign = "latest"            # Sigstore sign/verify artifacts & images
# J · multi-repo & release (~30 repos in ~/dev)
ghorg = "latest"             # bulk-clone an entire org/user
mani = "latest"              # run one command across many repos
"github:goreleaser/goreleaser" = "latest"  # build+release binaries and images (github backend skips the nightly prereleases aqua interleaves)
k6 = "latest"                # scriptable HTTP load testing
# K · config-format + agent extras
taplo = "latest"             # TOML formatter/linter (Cargo.toml, pyproject.toml)
yamlfmt = "latest"           # YAML formatter
cue = "latest"               # typed config validation / generation
helmfile = "latest"          # declarative multi-Helm release management
golangci-lint = "latest"     # Go meta-linter (you scaffold Go via go-blueprint)
"pipx:files-to-prompt" = "latest"  # fd/rg output → LLM prompt (pairs with repomix)
hexyl = "latest"             # colored hex viewer for binary/unknown formats

# ── Agent-native kit — tools an agent reaches for directly: plain-text notes,
#    a scriptable LLM CLI, and TUI HTTP/DB clients (the CLI half of the GUI-only
#    dbeaver/tableplus/posting workflow). Same portability rule: aqua prebuilts
#    win; pipx (PyPI) only where the tool is Python and has no aqua binary.
# L · notes + LLM
"aqua:zk-org/zk" = "latest"       # plain-text zettelkasten/notes CLI (zk-org maintained fork)
"aqua:sigoden/aichat" = "latest"  # all-in-one LLM CLI: REPL, shell-assistant, RAG, agents
# M · HTTP + DB clients (agent-scriptable; complement hurl/usql + GUI db tools)
"pipx:posting" = "latest"    # terminal HTTP client — Postman/Insomnia in a TUI (darrenburns)
# pgcli's psycopg dep uses the system libpq on non-Windows; inject psycopg[binary]
# so it ships the libpq-bundled wheel and is self-contained on mac + Linux pods.
"pipx:pgcli" = { version = "latest", uvx_args = "--with psycopg[binary]" }  # Postgres CLI: autocompletion + syntax highlight (dbcli)
"pipx:litecli" = "latest"    # SQLite CLI (dbcli)
"pipx:mycli" = "latest"      # MySQL/MariaDB CLI (dbcli)

# ── Agent dev-sandboxes — isolate what an autonomous agent can touch. Installed
#    but deliberately NOT auto-wired into the cc/co/ki/oc aliases (opt-in per
#    invocation — see the note by the Agents aliases in ~/.config/zsh/aliases.zsh).
#    nono (mac-only capability sandbox) lives in the Brewfile.
# N · sandboxes
"aqua:dagger/container-use" = "latest"  # `cu`/`container-use` — per-agent containerized dev envs (dagger)
"npm:@anthropic-ai/sandbox-runtime" = "latest"  # `srt` — OS-level fs/net sandbox (sandbox-exec/bubblewrap), no container

[settings]
idiomatic_version_file_enable_tools = []
# Private github: backends (e.g. oisin-ee/yeet) need a token to read releases.
# mise runs this via `sh -c` and reads the token from stdout — sourced from the
# already-authenticated gh, so nothing is stored and no shell env noise is needed.
github.credential_command = "gh auth token"
