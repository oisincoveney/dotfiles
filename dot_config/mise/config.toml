[tools]
# node: mise owns the default `node` on PATH (brew's node stays only as a silent
# dependency of backlog-md/neonctl/oxfmt/etc). Projects still pin their own via
# .node-version / mise.toml; nub reads whatever PATH node matches the pin.
node = "lts"
uv = "latest"

# ── Global JS CLIs — single source of truth (was scattered across Homebrew's
#    node prefix + bun global). mise installs each and shims its bin on PATH.
# Dev toolkit / agents
"npm:@nubjs/nub" = "latest"
"npm:opencode-ai" = "latest"
"npm:@oisincoveney/pipeline" = "latest"   # moka
"npm:@mariozechner/pi-coding-agent" = "latest"  # pi
"npm:agent-browser" = "latest"
"npm:eas-cli" = "latest"
# Codegen / scaffolding / lint
"npm:oxlint" = "latest"
"npm:fallow" = "latest"
"npm:context-awesome" = "latest"
"npm:@intellectronica/ruler" = "latest"
"npm:@melkeydev/go-blueprint" = "latest"
"npm:@devcontainers/cli" = "latest"
"npm:expo-doctor" = "latest"
"npm:ajv-cli" = "latest"
"npm:wscat" = "latest"
"npm:strip-json-comments-cli" = "latest"
# Zed ACP bridges
"npm:@zed-industries/claude-agent-acp" = "latest"
"npm:@zed-industries/claude-code-acp" = "latest"

# ── Portable CLI kit — installed identically on macOS + every Linux SSH box via
#    mise's aqua backend (prebuilt binaries, no compile, no Homebrew-on-Linux).
#    This is the cross-platform source of truth; brew = macOS GUI casks only.
# core replacements
eza = "latest"
bat = "latest"
fd = "latest"
ripgrep = "latest"
fzf = "latest"
zoxide = "latest"
starship = "latest"
atuin = "latest"
delta = "latest"
# zen TUIs
yazi = "latest"
lazygit = "latest"
lazydocker = "latest"
television = "latest"
# btop: no macOS prebuilt exists (aqua = linux-only). It's brew on mac +
# distro/aqua on Linux — the one unavoidable platform split. See run_once_01.
"github:Canop/broot" = "latest"
# modern-unix drop-ins
dust = "latest"
duf = "latest"
"aqua:dalance/procs" = "latest"
sd = "latest"
choose = "latest"
hyperfine = "latest"
tokei = "latest"
# charm + fetch (the sexy)
fastfetch = "latest"
"aqua:o2sh/onefetch" = "latest"
glow = "latest"
gum = "latest"
# data / http / net
xh = "latest"
jless = "latest"
"github:mr-karan/doggo" = "latest"
gping = "latest"
dasel = "latest"
# shell UX
carapace = "latest"
"cargo:tealdeer" = "latest"   # builds a binary named `tldr`
"cargo:navi" = "latest"
"cargo:pay-respects" = "latest"

# ── Agent-augmenting kit — tools an autonomous coding agent shells out to for
#    better work: structural edits, self-review diffs, secret/lint gates, repo→
#    context packing, k8s inspection, verify loops. Same portability rule as
#    above: aqua prebuilts win; npm/pipx/ubi only where no aqua binary exists.
#    All zero-config / inert-until-keyed — nothing here nags or needs upkeep.
# A · code-intel + edit-safety
ast-grep = "latest"          # `sg`/`ast-grep` — AST search+rewrite, no regex hell
difftastic = "latest"        # `difft` — syntax-aware diff (git dft); agent reviews own edits
semgrep = "latest"           # taint/bug patterns text-search can't express (pipx)
gitleaks = "latest"          # block secret commits
"cargo:git-absorb" = "latest"  # auto-fixup hunks into the right ancestor (no arm64-darwin prebuilt; compiles native)
shellcheck = "latest"        # lint agent-written shell before CI
shfmt = "latest"             # format agent-written shell
# B · agent context + data
"npm:repomix" = "latest"     # pack a repo into one LLM-context file
"pipx:jc" = "latest"         # any CLI output (ps/dig/ls/…) → JSON for piping (aqua darwin-arm64 asset missing)
miller = "latest"            # `mlr` — awk/sed/cut for CSV/TSV/JSON
ripgrep-all = "latest"       # `rga` — ripgrep over PDF/docx/zip (poppler already present)
"pipx:llm" = "latest"        # simonw llm — scriptable one-shot LLM calls in pipes/hooks
# C · kubernetes / infra CLI kit (had GUI freelens only)
k9s = "latest"               # cluster TUI
stern = "latest"             # multi-pod multi-container log tail
kubectx = "latest"           # fast context switch (auto-uses fzf)
kubens = "latest"            # fast namespace switch
dive = "latest"              # OCI image-layer bloat inspector
trivy = "latest"             # CVE/secret/misconfig scanner (self-updating DB)
kubecolor = "latest"         # colorized kubectl passthrough
# D · dev workflow / verify
just = "latest"              # task runner; `just --dump` is agent-discoverable
watchexec = "latest"         # re-run a command on file change
hurl = "latest"              # plain-text HTTP tests — agent verifies APIs
mprocs = "latest"            # run parallel procs in split panes
direnv = "latest"            # per-directory env (hook wired in tools.zsh)
sops = "latest"              # encrypted secrets in git (age key; GitOps-native)

[settings]
idiomatic_version_file_enable_tools = []
