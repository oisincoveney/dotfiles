uv = "latest"
"npm:opencode-ai" = "latest"
gh = "latest"
helm = "latest"
kubectl = "latest"
jq = "latest"
claude = "latest"
codex = "latest"

# ── Language toolchains — Layer-2 shared source (doc-2 decision 1: toolchains
#    lock via mise, not an npm/nub catalog entry — go/rust/python have no
#    catalog equivalent). This file + mise.lock is the ONE place fleet
#    language versions are pinned; a newly stamped repo does not point back
#    at this file live, it birth-seeds a copy of these exact resolved
#    versions into its own mise.toml (see docs/mise-birth-seed.md), then
#    Renovate's mise manager bumps each repo's copy forward in lockstep.
#    python pairs with `uv` (already pinned above) for venv creation —
#    mise's python core tool still owns interpreter version resolution.
go = "latest"
rust = "latest"
python = "latest"
node = "lts"

# ── Global JS CLIs — single source of truth (was scattered across Homebrew's
